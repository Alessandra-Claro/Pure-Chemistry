<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | SciTech</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Playfair+Display:ital,wght@0,400;1,700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body class="bg-[#fcfaf7] text-gray-900 selection:bg-emerald-200">
  
  <nav class="fixed w-full z-50 transition-all duration-500 border-b border-black/5 bg-[#f4efe6]/80 backdrop-blur-xl">
    <div class="max-w-7xl mx-auto px-8 h-24 flex justify-between items-center">
      <a class="flex items-baseline group" href="{{ '/' | relative_url }}">
        <span class="font-['Style_Script'] text-5xl text-black group-hover:text-emerald-900 transition-colors">sci</span>
        <span class="font-['Montserrat'] font-black text-2xl uppercase tracking-tighter text-black">tech</span>
      </a>
      
      <div class="hidden md:flex space-x-12 items-center">
        {% for link in site.nav %}
        <a class="font-['Montserrat'] text-[10px] font-bold uppercase tracking-[0.3em] text-emerald-900 hover:opacity-50 transition" href="{{ link.url | relative_url }}">{{ link.title }}</a>
        {% endfor %}
        <a href="/contact" class="bg-black text-white px-6 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-emerald-900 transition shadow-xl shadow-emerald-900/10">Get in touch</a>
      </div>
    </div>
  </nav>

  <main class="pt-32">
    {{ content }}
  </main>

  <footer class="py-20 bg-white border-t border-gray-100 mt-20">
    <div class="max-w-7xl mx-auto px-8 text-center">
      <p class="font-['Montserrat'] text-[9px] font-black uppercase tracking-[0.8em] text-gray-300">
        &copy; 2026 SciTech — Science Meets Aesthetic Authority
      </p>
    </div>
  </footer>
</body>
</html>
